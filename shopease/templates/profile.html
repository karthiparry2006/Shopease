{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card shadow">

<div class="card-body text-center">

<img
src="{{ profile.profile_image.url }}"
width="150"
height="150"
class="rounded-circle">

<h2 class="mt-3">

{{ user.username }}

</h2>

<p>

{{ user.email }}

</p>

<hr>

<div class="row">

<div class="col-md-4">

<h4>{{ orders }}</h4>

<p>Total Orders</p>

</div>

<div class="col-md-4">

<h4>{{ wishlist }}</h4>

<p>Wishlist</p>

</div>

<div class="col-md-4">

<h4>{{ cart }}</h4>

<p>Cart Items</p>

</div>

</div>

<hr>

<h5>Phone</h5>

<p>

{{ profile.phone }}

</p>

<h5>Address</h5>

<p>

{{ profile.address }}

</p>

</div>

</div>

</div>

{% endblock %}
