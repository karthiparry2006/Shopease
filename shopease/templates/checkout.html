{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Checkout</h2>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>Shipping Address</label>

        <textarea
            name="address"
            class="form-control"
            rows="4"
            required></textarea>

    </div>

    <div class="mb-3">

        <label>Phone Number</label>

        <input
            type="text"
            name="phone"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label>Payment Method</label>

        <select
            class="form-select"
            name="payment">

            <option value="COD">
                Cash On Delivery
            </option>

        </select>

    </div>
    <h4 class="mt-4">Order Summary</h4>

<table class="table table-bordered">

    <tr>
        <th>Product</th>
        <th>Qty</th>
        <th>Price</th>
    </tr>

    {% for item in items %}

    <tr>

        <td>{{ item.product.name }}</td>

        <td>{{ item.quantity }}</td>

        <td>₹ {{ item.total_price }}</td>

    </tr>

    {% endfor %}

</table>

    <h4 class="text-success">

        Grand Total : ₹ {{ total }}

    </h4>

    <button
        class="btn btn-success btn-lg">

        Place Order

    </button>

</form>

</div>

{% endblock %}
