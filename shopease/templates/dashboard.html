{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4 text-center">
Admin Dashboard
</h2>

<div class="row">

<div class="col-md-3">

<div class="card text-center bg-primary text-white mb-3">

<div class="card-body">

<h3>{{ products }}</h3>

<p>Total Products</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center bg-success text-white mb-3">

<div class="card-body">

<h3>{{ categories }}</h3>

<p>Categories</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center bg-warning text-dark mb-3">

<div class="card-body">

<h3>{{ orders }}</h3>

<p>Orders</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center bg-danger text-white mb-3">

<div class="card-body">

<h3>{{ users }}</h3>

<p>Users</p>

</div>

</div>

</div>

</div>

<div class="card mt-4">

<div class="card-body text-center">

<h2 class="text-success">

₹ {{ sales }}

</h2>

<h5>Total Sales</h5>

</div>

</div>

</div>

{% endblock %}
